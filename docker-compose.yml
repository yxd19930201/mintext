version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./minitext.db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Uncomment to use PostgreSQL instead of SQLite
